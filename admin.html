<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Maison Ghali</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a880;
            --gold-dark: #a8885e;
        }
        .admin-login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .admin-login-box {
            background: white;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 380px;
            max-width: 90%;
            text-align: center;
        }
        .admin-login-box .dash-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 0 10px 0;
            border-bottom: none;
            font-size: 26px;
            font-weight: 700;
        }
        .admin-login-box .dash-logo span { color: var(--gold); }
        .admin-login-box .logo-img { height: 32px; width: auto; }
        .admin-login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .admin-login-box .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .admin-login-box label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            display: block;
        }
        .admin-login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            min-height: 48px;
        }
        .admin-login-box input:focus { border-color: var(--gold); }
        .admin-login-box .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            margin-top: 10px;
            min-height: 48px;
            background: var(--gold);
            border-color: var(--gold);
        }
        .admin-login-box .btn-submit:hover { background: var(--gold-dark); }
        .admin-login-box .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        .admin-login-box .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
        }
        .admin-login-box .back-link:hover { color: #555; }
    </style>
</head>
<body class="admin-login-body">
    <div class="admin-login-box">
        <div class="dash-logo"><img src="IMAGE/logo-maison-ghali.svg" alt="Maison Ghali" class="logo-img"> Maison <span>Ghali</span></div>
        <p>Acc&egrave;s r&eacute;serv&eacute; &agrave; l'administrateur</p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" id="login-user" placeholder="Admin" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-pass" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn-submit">Se connecter</button>
            <p class="error-msg" id="login-error">Identifiant ou mot de passe incorrect</p>
        </form>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retour au site</a>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById("login-user").value.trim();
            const pass = document.getElementById("login-pass").value.trim();
            if (user === "admin" && pass === "maison-ghali-admin") {
                localStorage.setItem("dashAuth", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }
    </script>
</body>
</html>
